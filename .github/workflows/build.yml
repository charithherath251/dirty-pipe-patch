name: Build Patched Kernel
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev bison flex \
            libssl-dev libelf-dev bc rsync debhelper gcc-12 g++-12

      - name: Download Kernel Source
        run: |
          wget https://mirrors.edge.kernel.org/pub/linux/kernel/v5.x/linux-5.11.5.tar.xz
          tar -xf linux-5.11.5.tar.xz

      - name: Apply Patches
        run: |
          cp splice.c linux-5.11.5/fs/splice.c
          cp iov_iter.c linux-5.11.5/lib/iov_iter.c

      - name: Configure and Build
        run: |
          cd linux-5.11.5

          # Fix 1: Patch the objtool source that breaks on GCC 12+ 
          # (use-after-free warning treated as error in subcmd-util.h)
          sed -i 's/cc1: all warnings being treated as errors//' tools/objtool/Makefile 2>/dev/null || true
          sed -i 's/-Werror//' tools/objtool/Makefile

          make defconfig

          ./scripts/config --set-str LOCALVERSION "-patched"
          ./scripts/config --disable DEBUG_INFO
          ./scripts/config --disable DEBUG_INFO_BTF
          ./scripts/config --disable UNWINDER_ORC
          ./scripts/config --enable UNWINDER_FRAME_POINTER
          ./scripts/config --disable SYSTEM_TRUSTED_KEYS
          ./scripts/config --disable SYSTEM_REVOCATION_KEYS
          # Fix 2: disable objtool entirely - not needed for functional patching
          ./scripts/config --disable STACK_VALIDATION

          make olddefconfig

          make -j$(nproc) bindeb-pkg+

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-kernel-debs
          path: ./*.deb
